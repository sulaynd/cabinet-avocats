<div class="prise-rdv-publique">
  <h2>Prendre rendez-vous avec le cabinet</h2>

  <div *ngIf="reservationConfirmee; else formulaire" class="confirmation-rdv">
    <p>✅ Votre demande de rendez-vous a bien été envoyée. Un email de confirmation vous a été adressé, et le cabinet validera ce créneau très prochainement.</p>
  </div>

  <ng-template #formulaire>
    <form [formGroup]="form" (ngSubmit)="reserver()" class="rdv-form">
      <label>
        Avocat souhaité
        <select formControlName="avocat_id" (change)="chargerCreneaux()">
          <option [ngValue]="null">-- Sélectionner --</option>
          <option *ngFor="let a of avocats" [ngValue]="a.id">{{ a.name }}</option>
        </select>
      </label>

      <div *ngIf="chargementCreneaux">Chargement des créneaux...</div>

      <div class="creneaux" *ngIf="!chargementCreneaux && creneaux.length">
        <button
          type="button"
          *ngFor="let c of creneaux"
          class="creneau-btn"
          [class.selectionne]="creneauChoisi === c"
          (click)="creneauChoisi = c"
        >
          {{ c | date: 'EEE d MMM, HH:mm' }}
        </button>
      </div>
      <p *ngIf="!chargementCreneaux && form.value.avocat_id && creneaux.length === 0" class="vide">
        Aucun créneau disponible dans les 14 prochains jours.
      </p>

      <label>Nom complet<input type="text" formControlName="nom" /></label>
      <label>Email<input type="email" formControlName="email" /></label>
      <label>Téléphone (facultatif)<input type="text" formControlName="telephone" /></label>
      <label>Motif de la consultation (facultatif)<textarea formControlName="motif" rows="3"></textarea></label>

      <p class="erreur" *ngIf="erreur">{{ erreur }}</p>

      <button type="submit" class="btn-primary" [disabled]="form.invalid || !creneauChoisi || reservationEnCours">
        {{ reservationEnCours ? 'Réservation...' : 'Confirmer la demande de rendez-vous' }}
      </button>
    </form>
  </ng-template>
</div>

<form [formGroup]="form" (ngSubmit)="soumettre()" class="login-form">
  <h2>Connexion</h2>

  <p class="erreur" *ngIf="sessionExpiree">Votre session a expiré, merci de vous reconnecter.</p>

  <label>
    Email
    <input type="email" formControlName="email" autocomplete="username" />
  </label>

  <label>
    Mot de passe
    <input type="password" formControlName="password" autocomplete="current-password" />
  </label>

  <p class="erreur" *ngIf="erreur">{{ erreur }}</p>

  <button type="submit" [disabled]="form.invalid || chargement">
    {{ chargement ? 'Connexion...' : 'Se connecter' }}
  </button>
</form>

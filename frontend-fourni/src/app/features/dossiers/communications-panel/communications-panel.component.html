<div class="communications-panel">
  <div class="section-entete">
    <h3>Historique des communications</h3>
    <button class="btn-lien" (click)="afficherFormulaire = !afficherFormulaire">
      {{ afficherFormulaire ? 'Annuler' : '+ Ajouter une communication' }}
    </button>
  </div>

  <form *ngIf="afficherFormulaire" [formGroup]="form" (ngSubmit)="enregistrer()" class="form-communication">
    <select formControlName="type">
      <option *ngFor="let t of types" [value]="t">{{ t }}</option>
    </select>
    <input type="text" placeholder="Objet" formControlName="objet" />
    <textarea placeholder="Détails (facultatif)" formControlName="contenu" rows="2"></textarea>
    <button type="submit" class="btn btn-primaire" [disabled]="form.invalid">Enregistrer</button>
  </form>

  <ul class="liste-communications" *ngIf="communications.length; else aucune">
    <li *ngFor="let c of communications">
      <span class="badge">{{ c.type }}</span>
      <div class="contenu-communication">
        <strong>{{ c.objet }}</strong>
        <p *ngIf="c.contenu">{{ c.contenu }}</p>
        <span class="meta-communication">{{ c.date_communication | date: 'dd/MM/yyyy HH:mm' }} — {{ c.user?.name }}</span>
      </div>
      <button class="btn-lien" (click)="supprimer(c.id)">Supprimer</button>
    </li>
  </ul>
  <ng-template #aucune><p class="vide">Aucune communication enregistrée.</p></ng-template>
</div>

<div class="portail-login">
  <h2>Espace client — Lambert &amp; Associés</h2>
  <form [formGroup]="form" (ngSubmit)="soumettre()" class="login-form">
    <label>Email<input type="email" formControlName="email" /></label>
    <label>Mot de passe<input type="password" formControlName="password" /></label>
    <p class="erreur" *ngIf="erreur">{{ erreur }}</p>
    <button type="submit" [disabled]="form.invalid || chargement">{{ chargement ? 'Connexion...' : 'Se connecter' }}</button>
    <p class="sync-note">Vos identifiants vous ont été communiqués par le cabinet lors de l'activation de votre accès.</p>
  </form>
</div>

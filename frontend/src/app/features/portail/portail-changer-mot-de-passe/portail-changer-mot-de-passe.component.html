<div class="ecran-connexion">
  <form [formGroup]="form" (ngSubmit)="soumettre()" class="portail-login-material dossier-form-material">
    <div class="marque">
      <div class="sceau">🔒</div>
      <div class="nom">Nouveau mot de passe</div>
    </div>

    <p class="permission-note" style="margin-bottom: 18px;">
      Pour votre sécurité, choisissez un nouveau mot de passe avant de continuer — celui reçu par
      email n'était que temporaire.
    </p>

    <mat-form-field appearance="outline" class="champ-pleine-largeur">
      <mat-label>Nouveau mot de passe</mat-label>
      <input matInput type="password" formControlName="password" />
      <mat-hint>8 caractères minimum</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline" class="champ-pleine-largeur">
      <mat-label>Confirmer le mot de passe</mat-label>
      <input matInput type="password" formControlName="confirmation" />
    </mat-form-field>

    <p class="erreur" *ngIf="form.errors?.['motsDePasseDifferents'] && form.get('confirmation')?.touched">
      Les deux mots de passe ne correspondent pas.
    </p>
    <p class="erreur" *ngIf="erreur">{{ erreur }}</p>

    <div class="actions-formulaire">
      <button mat-button type="button" (click)="annuler()">Annuler</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || chargement">
        {{ chargement ? 'Enregistrement...' : 'Confirmer le nouveau mot de passe' }}
      </button>
    </div>
  </form>
</div>
